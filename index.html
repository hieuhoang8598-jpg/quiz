  header .subtitle { font-size: 12px; opacity: 0.7; margin-top: 3px; }
  .progress-bar-wrap { background: #dde3ed; height: 6px; }
  .progress-bar { background: #e8a020; height: 6px; transition: width 0.4s; }
  .container { max-width: 720px; margin: 32px auto; padding: 0 16px 60px; }
  .card { background: white; border-radius: 14px; padding: 32px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  .step-label { font-size: 12px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  h2 { font-size: 19px; font-weight: 700; margin-bottom: 6px; color: #1a3c6e; line-height: 1.4; }
  .question-desc { font-size: 13px; color: #888; margin-bottom: 22px; }
  /* Image grid for ALL questions */
  .img-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .img-grid.three-col { grid-template-columns: repeat(3, 1fr); }
  .img-opt {
    border: 3px solid #e0e4ef; border-radius: 12px; overflow: hidden;
    cursor: pointer; transition: all 0.2s; position: relative;
  }
  .img-opt:hover { border-color: #1a3c6e; transform: translateY(-2px); box-shadow: 0 6px 18px rgba(26,60,110,0.15); }
  .img-opt.selected { border-color: #e8a020; box-shadow: 0 0 0 3px rgba(232,160,32,0.25); }
  .img-opt img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
  .img-opt.bag-opt img { aspect-ratio: 3/4; }
  .check-badge {
    position: absolute; top: 8px; right: 8px;
    width: 26px; height: 26px; border-radius: 50%;
    background: #e8a020; color: white;
    display: none; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
  }
  .img-opt.selected .check-badge { display: flex; }
  .img-label {
    padding: 10px 12px; font-size: 13px; font-weight: 600;
    text-align: center; color: #333; background: #fafafa;
    border-top: 1px solid #eee; line-height: 1.3;
  }
  .letter-tag {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,0.45); color: white;
    font-size: 11px; font-weight: 700; padding: 2px 7px;
    border-radius: 4px; letter-spacing: 0.5px;
  }
  /* Buttons */
  .btn-row { display: flex; justify-content: space-between; margin-top: 28px; gap: 12px; align-items: center; }
  .btn { padding: 12px 28px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-next { background: #1a3c6e; color: white; margin-left: auto; }
  .btn-next:hover { background: #142f56; }
  .btn-back { background: #e8eaf0; color: #555; }
  .btn-back:hover { background: #d5d9e5; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  /* Done */
  .done-card { text-align: center; padding: 48px 24px; }
  .done-card .icon { font-size: 60px; margin-bottom: 16px; }
  .done-card h2 { font-size: 22px; margin-bottom: 10px; color: #1a3c6e; }
  .done-card p { color: #777; font-size: 15px; line-height: 1.6; }
  .sending { margin-top: 16px; font-size: 13px; color: #aaa; }

let current = 0, answers = {};

function getImgSrc(src) {
  return BAG_IMGS[src] || src;
}

function render() {
  const q = questions[current];
  const card = document.getElementById('quizCard');
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';

  const cols = q.isBag ? 'three-col' : '';
  const bagClass = q.isBag ? 'bag-opt' : '';

  card.innerHTML = `
    <div class="step-label">Question ${current+1} of ${questions.length}</div>
    <h2>${q.title}</h2>
    <p class="question-desc">${q.desc}</p>
    <div class="img-grid ${cols}">
      ${q.options.map((o, i) => `
        <div class="img-opt ${bagClass} ${answers[q.id]===i?'selected':''}" onclick="pick(${i})">
          <img src="${getImgSrc(o.img)}" alt="${o.label}" loading="lazy" />
          <div class="letter-tag">${['A','B','C','D'][i]}</div>
          <div class="check-badge">✓</div>
          <div class="img-label">${o.label.replace(/^[A-D]\.\s/,'')}</div>
        </div>
      `).join('')}
    </div>
    <div class="btn-row">
      ${current > 0 ? '<button class="btn btn-back" onclick="goBack()">← Back</button>' : '<div></div>'}
      <button class="btn btn-next" id="btnNext" onclick="goNext()" ${answers[q.id]===undefined?'disabled':''}>
        ${current===questions.length-1 ? 'Submit ✓' : 'Next →'}
      </button>
    </div>
  `;
}

function pick(i) { answers[questions[current].id] = i; render(); }
function goBack() { if (current > 0) { current--; render(); } }
function goNext() {
  if (current < questions.length - 1) { current++; render(); }
  else submitQuiz();
}

function submitQuiz() {
  document.getElementById('quizCard').innerHTML = `
    <div class="done-card">
      <div class="icon">✅</div>
      <h2>Thank you for completing the survey!</h2>
      <p>Your responses have been recorded.<br>We'll use this to personalise your English learning experience.</p>
      <p class="sending" id="sendStatus">Submitting your answers...</p>
    </div>`;

  const q5i = answers['q5'];
  const bagPicked = q5i !== undefined ? questions[4].options[q5i].label : 'Not selected';
  const summary = questions.map((q,qi) => {
    const i = answers[q.id];
    const ans = i !== undefined ? q.options[i].label : 'Skipped';
    return `Q${qi+1}: ${q.title}\n→ ${ans}`;
  }).join('\n\n');

  emailjs.send("service_l2mn9hb", "f0sau5c", {
    to_email: "hieuhoang8598@gmail.com",
    subject: "📋 Survey Result — Bag chosen: " + bagPicked,
    message: summary
  }).then(() => {
    document.getElementById('sendStatus').textContent = '✓ Submitted successfully!';
  }).catch(err => {
    document.getElementById('sendStatus').textContent = '✓ Response recorded.';
    localStorage.setItem('survey_backup', summary);
  });
}

render();
</script>
